name: Bench

on: [workflow_dispatch]

jobs:
  bench:
    name: Build and Bench ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-avx2
            rustflags: "-C target-cpu=x86-64-v3 -C link-arg=-Wl,--as-needed -C link-arg=-Wl,--gc-sections"
            target: x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            name: linux-avx512
            rustflags: "-C target-cpu=x86-64-v4 -C link-arg=-Wl,--as-needed -C link-arg=-Wl,--gc-sections"
            target: x86_64-unknown-linux-gnu

          - os: windows-latest
            name: windows-avx2
            rustflags: "-C target-cpu=x86-64-v3 -C link-arg=/OPT:REF -C link-arg=/OPT:ICF -C link-arg=/STACK:8388608"
            target: x86_64-pc-windows-msvc

          - os: windows-latest
            name: windows-avx512
            rustflags: "-C target-cpu=x86-64-v4 -C link-arg=/OPT:REF -C link-arg=/OPT:ICF -C link-arg=/STACK:8388608"
            target: x86_64-pc-windows-msvc

          - os: macos-latest
            name: macos
            rustflags: "-C target-cpu=apple-m1 -C link-arg=-Wl,-dead_strip"
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Read network name (Unix)
        if: runner.os != 'Windows'
        run: echo "DEFAULT_NET=$(cat network.txt)" >> $GITHUB_ENV

      - name: Read network name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $net = Get-Content network.txt -Raw
          $net = $net.Trim()
          echo "DEFAULT_NET=$net" >> $env:GITHUB_ENV

      - name: Download network
        run: |
          curl -L -o hobbes.nnue https://github.com/kelseyde/hobbes-networks/releases/download/${{ env.DEFAULT_NET }}/${{ env.DEFAULT_NET }}.nnue

      - name: Build and run bench (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo build --release -p hobbes-chess-engine --jobs $(nproc)
          ./target/release/hobbes-chess-engine bench
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "${{ matrix.rustflags }}"
          CARGO_INCREMENTAL: 1

      - name: Build and run bench (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build --release -p hobbes-chess-engine --jobs $(sysctl -n hw.ncpu)
          ./target/release/hobbes-chess-engine bench
        env:
          CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS: "${{ matrix.rustflags }}"
          CARGO_INCREMENTAL: 1

      - name: Build and run bench (Windows)
        if: runner.os == 'Windows'
        run: |
          cargo build --release -p hobbes-chess-engine --jobs $env:NUMBER_OF_PROCESSORS
          ./target/release/hobbes-chess-engine.exe bench
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: "${{ matrix.rustflags }}"
          CARGO_INCREMENTAL: 1
