name: Hobbes Releases

on: [workflow_dispatch]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:

          - os: ubuntu-latest
            name: hobbes-linux-avx2
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v3"

          - os: ubuntu-latest
            name: hobbes-linux-avx512
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v4"

          - os: windows-latest
            name: hobbes-windows-avx2
            target: x86_64-pc-windows-msvc
            rustflags: "-C target-cpu=x86-64-v3"

          - os: windows-latest
            name: hobbes-windows-avx512
            target: x86_64-pc-windows-msvc
            rustflags: "-C target-cpu=x86-64-v4"

          - os: macos-latest
            name: hobbes-macos
            target: aarch64-apple-darwin
            rustflags: "-C target-cpu=native"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download network
        shell: bash
        run: |
          NET_NAME=$(cat network.txt)
          echo "Downloading ${NET_NAME}.nnue"
          curl -sL -o hobbes.nnue "https://github.com/kelseyde/hobbes-networks/releases/download/${NET_NAME}/${NET_NAME}.nnue"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release
        env:
          RUSTFLAGS: "${{ matrix.rustflags }}"

      - name: Verify build with bench
        run: cargo run --release -- bench
        env:
          RUSTFLAGS: "${{ matrix.rustflags }}"

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          tuple=$(rustc --print host-tuple)
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv target\\$tuple\\release\\hobbes-chess-engine.exe ${{ matrix.name }}.exe
          else
            mv target/$tuple/release/hobbes-chess-engine ${{ matrix.name }}
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.exe
          retention-days: 1

  release:
    name: Development release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA hash
        id: hash
        run: echo "COMMIT_SHA=$(git rev-parse HEAD | cut -c 1-8)" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.4.1
        with:
          name: Hobbes 1.0-dev-${{ env.COMMIT_SHA }}
          draft: true
          prerelease: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

